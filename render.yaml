services:
  - type: web
    name: fitai-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw package -DskipTests
    startCommand: java -jar target/fitai-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: USDA_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
