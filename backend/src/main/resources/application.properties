# Server
server.port=${PORT:8080}

# Tell Spring Boot's auto-configured ObjectMapper to use ISO-8601 dates (not timestamps)
# This also enables LocalDate deserialization from JSON strings like "2026-05-10"
spring.jackson.serialization.write-dates-as-timestamps=false

# Database — set via environment variables in production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.show-sql=false

# Supabase pooler requires SSL and prepared statement disabling in transaction mode
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Supabase project URL and anon key — used to validate tokens via /auth/v1/user
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}

# USDA FoodData Central API key — free key at https://fdc.nal.usda.gov/api-guide.html
usda.api-key=${USDA_API_KEY}

# CORS — allow the Vite dev server, production frontend, and any Netlify preview URLs
# Override with CORS_ALLOWED_ORIGINS env var in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://fitai-tracker.netlify.app}
